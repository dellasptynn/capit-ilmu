<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesin Capit Edukasi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <header class="header">
      <h1>Capit Mania by Kelompok 1</h1>
    </header>

    <div class="claw-machine">
      <div class="machine-top"></div>
      <div class="machine-glass">
        <!-- The Claw -->
        <div class="claw-rail">
          <div class="claw-base" id="claw">
            <div class="claw-arm left"></div>
            <div class="claw-arm right"></div>
            <div class="claw-arm center"></div>
          </div>
        </div>
        <!-- Balls Container -->
        <div class="balls-container" id="balls-container">
          <!-- Balls will be generated by JS -->
        </div>
      </div>
      <div class="machine-base">
        <div class="slot" id="prize-slot"></div>
        <div class="controls">
          <button id="btn-draw" class="btn-draw">CARI MANGSA</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Ready -->
  <div id="ready-modal" class="modal hidden">
    <div class="modal-content glass-effect">
      <h2 class="tumbal-intro">MANGSA TERPILIH:</h2>
      <h1 id="ready-tumbal-name" class="tumbal-name huge-text">NAMA</h1>
      <p class="ready-warning">Anda punya waktu 20 detik untuk menjawab pertanyaan berikutnya!</p>
      <button id="btn-ready" class="btn-draw">READY?</button>
    </div>
  </div>

  <!-- Modal untuk Pertanyaan -->
  <div id="question-modal" class="modal hidden">
    <div class="modal-content glass-effect">
      <div class="timer-container">
        <span id="timer-text" class="timer-text">20</span>
      </div>
      
      <h2 id="tumbal-name" class="tumbal-name hide-desktop">Nama Tumbal</h2>
      
      <div class="question-box">
        <h3 id="question-text">Pertanyaan akan muncul di sini...</h3>
      </div>
      
      <div id="options-container" class="options-container">
        <!-- Opsi jawaban akan di render disini -->
      </div>
    </div>
  </div>

  <!-- Modal Notifikasi (Benar/Salah/Waktu Habis) -->
  <div id="alert-modal" class="alert-modal hidden">
    <div class="alert-content glass-effect">
      <h2 id="alert-title">Benar!</h2>
      <p id="alert-message">Luar biasa.</p>
      <button id="btn-continue" class="btn-continue">Lanjut</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
